# Search Screen Flow
# Run: maestro test maestro/search_flow.yaml

appId: com.thulobazaar.mobile
---
- launchApp

- assertVisible: "THULO.*BAZAAR"
- takeScreenshot: 01_home

- tapOn: "Search"
- assertVisible: "Search for anything"
- takeScreenshot: 02_search

- scroll:
    direction: DOWN
- takeScreenshot: 03_search_scrolled

- scroll:
    direction: DOWN
- takeScreenshot: 04_search_more

- tapOn:
    text: ".*Rs\\..*"
    index: 0
- takeScreenshot: 05_ad_detail

- back

- tapOn: "Messages"
- takeScreenshot: 06_messages

- tapOn: "Profile"
- takeScreenshot: 07_profile

- tapOn: "Home"
- takeScreenshot: 08_home_final
