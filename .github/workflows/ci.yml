name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Type Check & Lint
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w packages/types
          npm run build -w packages/utils
          cd packages/upload-utils && npx tsc --module commonjs --moduleResolution node && cd ../..
          npm run build -w packages/api-client

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Type Check
        run: npm run type-check
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

  # Job 2: Unit & Integration Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w packages/types
          npm run build -w packages/utils
          cd packages/upload-utils && npx tsc --module commonjs --moduleResolution node && cd ../..
          npm run build -w packages/api-client

      - name: Fix platform-specific native modules
        run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Run Unit Tests
        run: npm run test:run
        working-directory: apps/web

  # Job 3: E2E Tests
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w packages/types
          npm run build -w packages/utils
          cd packages/upload-utils && npx tsc --module commonjs --moduleResolution node && \
            node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json','utf8'));delete p.exports;delete p.module;fs.writeFileSync('package.json',JSON.stringify(p,null,2))" && cd ../..
          npm run build -w packages/api-client

      - name: Generate Prisma Client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Fix platform-specific native modules
        run: npm install --no-save lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu @unrs/resolver-binding-linux-x64-gnu @rollup/rollup-linux-x64-gnu @img/sharp-linux-x64

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Application
        run: npm run build
        working-directory: apps/web
        env:
          SKIP_ENV_VALIDATION: true
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3333
          NEXT_PUBLIC_API_URL: http://localhost:5000

      - name: Copy static assets for standalone build
        run: |
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public || true
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static || true

      - name: Run E2E Tests
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: true
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3333

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # Job 4: Build Check
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w packages/types
          npm run build -w packages/utils
          cd packages/upload-utils && npx tsc --module commonjs --moduleResolution node && cd ../..
          npm run build -w packages/api-client
        env:
          SKIP_ENV_VALIDATION: true

  # Job 5: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # Job 6: Deploy to Production (only on push to main)
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_REGION: ap-south-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://api.thulobazaar.com.np \
            --build-arg NEXT_PUBLIC_SITE_URL=https://thulobazaar.com.np \
            --build-arg NEXT_PUBLIC_API_HOSTNAME=api.thulobazaar.com.np \
            -t "$ECR_REGISTRY/thulobazaar-web:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/thulobazaar-web:latest" .
          docker push "$ECR_REGISTRY/thulobazaar-web" --all-tags

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile \
            -t "$ECR_REGISTRY/thulobazaar-api:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/thulobazaar-api:latest" .
          docker push "$ECR_REGISTRY/thulobazaar-api" --all-tags

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            cd /opt/thulobazaar
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose -f docker-compose.prod.yml pull web api nginx
            docker compose -f docker-compose.prod.yml up -d --no-deps web api
            docker compose -f docker-compose.prod.yml restart nginx
            sleep 10
            curl --fail --retry 3 --retry-delay 5 http://127.0.0.1:80 || echo "WARNING: Web health check failed!"
            curl --fail --retry 3 --retry-delay 5 -H "Host: api.thulobazaar.com.np" http://127.0.0.1:80/api/health || echo "WARNING: API health check failed!"
            docker image prune -f
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
