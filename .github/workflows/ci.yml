name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

jobs:
  # Job 1: Type Check & Lint
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check
        working-directory: apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

  # Job 2: Unit & Integration Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:run
        working-directory: apps/web

  # Job 3: E2E Tests
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Application
        run: npm run build
        working-directory: apps/web
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run E2E Tests
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # Job 4: Build Check
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w packages/types
          npm run build -w packages/utils
          npm run build -w packages/upload-utils
          npm run build -w packages/api-client
        env:
          SKIP_ENV_VALIDATION: true

  # Job 5: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # Job 6: Deploy to Production (only on push to main)
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    # needs: [build]  # TODO: re-enable after fixing CI quality gates
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_REGION: ap-south-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Web image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=https://api.thulobazaar.com.np \
            --build-arg NEXT_PUBLIC_SITE_URL=https://thulobazaar.com.np \
            --build-arg NEXT_PUBLIC_API_HOSTNAME=api.thulobazaar.com.np \
            -t "$ECR_REGISTRY/thulobazaar-web:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/thulobazaar-web:latest" .
          docker push "$ECR_REGISTRY/thulobazaar-web" --all-tags

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile \
            -t "$ECR_REGISTRY/thulobazaar-api:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/thulobazaar-api:latest" .
          docker push "$ECR_REGISTRY/thulobazaar-api" --all-tags

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            cd /opt/thulobazaar
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker compose -f docker-compose.prod.yml pull web api
            docker compose -f docker-compose.prod.yml up -d --no-deps web api
            docker image prune -f
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
