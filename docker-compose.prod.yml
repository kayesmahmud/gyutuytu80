version: '3.8'

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: thulobazaar-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # ---- Next.js Frontend ----
  web:
    image: ${ECR_REGISTRY:-thulobazaar}/web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: thulobazaar-web
    environment:
      - NODE_ENV=production
      - PORT=3333
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:5000}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://thulobazaar.com.np}
      - NEXT_PUBLIC_API_HOSTNAME=${NEXT_PUBLIC_API_HOSTNAME:-api.thulobazaar.com.np}
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://thulobazaar.com.np}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ---- Express API ----
  api:
    image: ${ECR_REGISTRY:-thulobazaar}/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: thulobazaar-api
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-thulobazaar}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-thulobazaar}
      - DATABASE_URL=postgresql://${DB_USER:-thulobazaar}:${DB_PASSWORD}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-thulobazaar}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://thulobazaar.com.np}
      - FRONTEND_URL=${FRONTEND_URL:-https://thulobazaar.com.np}
      - BACKEND_URL=${BACKEND_URL:-https://api.thulobazaar.com.np}
      - UPLOAD_DIR=/app/uploads
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: thulobazaar-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-thulobazaar}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-thulobazaar}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-thulobazaar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Typesense Search Engine ----
  typesense:
    image: typesense/typesense:0.25.2
    container_name: thulobazaar-typesense
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY}
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --listen-port 8108 --enable-cors'
    restart: unless-stopped

volumes:
  uploads-data:
    driver: local
  postgres-data:
    driver: local
  typesense-data:
    driver: local
